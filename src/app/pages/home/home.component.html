<mat-card class="card">
    <mat-card-title>Currency converter</mat-card-title>
    <!-- {{currencies | json}} -->
    <mat-card-content class="card_content">

        <!-- {{convert_result | json }} -->
        <!-- {{keys[0]}} -->

        <mat-form-field appearance="outline">
            <mat-label>Converter de:</mat-label>
            <mat-select matInput name="currency_from" #currency_from>
                <mat-option *ngFor="let currency of currencies | keyvalue" value="{{currency.key}}">{{currency.value}}</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Converter para:</mat-label>
            <mat-select matInput name="currency_to" #currency_to>
                <mat-option *ngFor="let currency of currencies | keyvalue" value="{{currency.key}}">{{currency.value}}</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Insira o valor:</mat-label>
            <input matInput name="value_from" type="number" #value_from>
        </mat-form-field>

        <button (click)="convertCurrency(currency_from.value, currency_to.value, value_from.value)" class="button" mat-flat-button color="primary">Converter</button>
    </mat-card-content>

</mat-card>
